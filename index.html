    // De-dupe by name (your list had duplicates earlier)
    const seen = new Set();
    const uniq = [];
    for (const w of WINES) {
      if (!seen.has(w.name)) { uniq.push(w); seen.add(w.name); }
    }

    // =========================
    // 2) QR + Admin gating
    // =========================
    const params = new URLSearchParams(window.location.search);
    const isAdmin = params.get("admin") === "1";

    // Always generate QR to the *normal staff link* (no admin param)
    const staffUrl = window.location.origin + window.location.pathname.replace(/\/?$/, "/");
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=" + encodeURIComponent(staffUrl);

    // =========================
    // 3) APP
    // =========================
    function App() {
      const [search, setSearch] = React.useState("");
      const [openName, setOpenName] = React.useState(null);
      const [showQR, setShowQR] = React.useState(false);

      const filtered = uniq.filter(w => {
        const s = search.toLowerCase().trim();
        if (!s) return true;
        return (
          (w.name || "").toLowerCase().includes(s) ||
          (w.region || "").toLowerCase().includes(s) ||
          (w.grapes || "").toLowerCase().includes(s) ||
          (w.category || "").toLowerCase().includes(s)
        );
      });

      return React.createElement(
        "div",
        { className: "max-w-3xl mx-auto p-4 pb-24" },

        // Header
        React.createElement(
          "div",
          { className: "sticky top-0 bg-black pt-6 pb-4 z-10" },
          React.createElement(
            "div",
            { className: "flex items-center justify-between gap-3" },
            React.createElement("h1", { className: "text-2xl font-extrabold tracking-widest uppercase" }, "Wine Bible"),

            // ADMIN ONLY: QR button
            isAdmin
              ? React.createElement(
                  "button",
                  { className: "btn", onClick: () => setShowQR(true) },
                  "Show Staff QR"
                )
              : React.createElement("div", null)
          ),

          React.createElement("div", { className: "mt-4" },
            React.createElement("input", {
              type: "text",
              value: search,
              placeholder: `Search all ${uniq.length} wines...`,
              className: "w-full p-4 text-lg outline-none",
              onChange: (e) => { setSearch(e.target.value); setOpenName(null); }
            })
          )
        ),

        // List
        React.createElement(
          "div",
          { className: "mt-4 space-y-3" },
          filtered.map(w => {
            const isOpen = openName === w.name;

            return React.createElement(
              "div",
              { key: w.name, className: "card p-4" },

              React.createElement(
                "button",
                {
                  className: "w-full flex items-center justify-between text-left",
                  onClick: () => setOpenName(isOpen ? null : w.name)
                },

                React.createElement(
                  "div",
                  null,
                  React.createElement("div", { className: "tag" }, w.category),
                  React.createElement("div", { className: "text-lg font-semibold mt-1" }, w.name),
                  React.createElement("div", { className: "text-sm text-zinc-400 mt-1" }, `${w.region} • ${w.grapes}`)
                ),

                React.createElement("div", { className: "text-2xl text-zinc-500 leading-none" }, isOpen ? "–" : "+")
              ),

              isOpen && React.createElement(
                "div",
                { className: "mt-4 pt-4 border-t border-zinc-800 space-y-4 text-sm" },

                // Taste
                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Taste"),
                  React.createElement("div", { className: "text-zinc-100" }, w.taste || "—")
                ),

                // Guest-friendly
                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Guest-friendly description"),
                  React.createElement("div", { className: "text-zinc-100" }, w.guest || "—")
                ),

                // Selling line
                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Selling line"),
                  React.createElement("div", { className: "text-zinc-100" }, w.selling || "—")
                ),

                // Service
                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Service note"),
                  React.createElement("div", { className: "text-zinc-100" }, w.service || "—")
                )
              )
            );
          })
        ),

        // QR Modal (admin only)
        (isAdmin && showQR) && React.createElement(
          "div",
          { className: "fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-6" },
          React.createElement(
            "div",
            { className: "bg-zinc-900 w-full max-w-sm p-6 rounded-[2rem] border border-zinc-800 text-center relative" },

            React.createElement(
              "button",
              { className: "absolute top-4 right-4 text-zinc-400 text-xl", onClick: () => setShowQR(false) },
              "×"
            ),

            React.createElement(
              "div",
              { className: "bg-white p-4 rounded-3xl inline-block shadow-2xl mb-5" },
              React.createElement("img", { src: qrUrl, className: "w-56 h-56", alt: "Staff Access QR" })
            ),

            React.createElement("div", { className: "text-lg font-extrabold tracking-widest uppercase" }, "Staff Access"),
            React.createElement("div", { className: "text-xs text-zinc-400 mt-2" }, "Scan to open the Wine Bible."),

            React.createElement("div", { className: "mt-5 flex gap-3 justify-center flex-wrap" },

                className: "btn",

                target: "_blank",
                rel: "noreferrer"
              }, "Open QR Image"),

                className: "btn",
                href: qrUrl,
                download: "wine-bible-qr.png"
              }, "Download QR")
            ),

            React.createElement("div", { className: "text-[11px] text-zinc-500 mt-4" },
              "If Download doesn’t work in your browser: click “Open QR Image”, then right-click the QR and choose “Save image as…”"
            )
          )
