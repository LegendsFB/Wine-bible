<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wine Bible</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    body { background:#000; color:#fff; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    .card { background:#111; border:1px solid #222; border-radius:18px; }
    input { background:#111 !important; color:#fff !important; border:1px solid #222 !important; border-radius:14px !important; }
    .tag { color:#fbbf24; font-weight:800; font-size:10px; text-transform:uppercase; letter-spacing:.12em; margin-right:10px; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    // ✅ Replace/expand these objects as needed
    const WINES = [
      {
        category: "White",
        name: "Esedra | Pinot Grigio",
        region: "Friuli, Italy",
        grapes: "Pinot Grigio",
        taste: "High acid / light body / lemon, pear, white flowers, minerality",
        guest: "Crisp, clean, refreshing — like a squeeze of lemon over chilled pear.",
        selling: "The ‘serious’ Pinot Grigio: brighter, cleaner, more mineral than basic versions.",
        service: "Serve well-chilled (6–8°C). White wine glass."
      },
      {
        category: "Sparkling & Rosé",
        name: "Piper-Heidsieck | Champagne",
        region: "Champagne, France",
        grapes: "Champagne blend",
        taste: "High acid / light+ body / citrus, brioche, almond, fine persistent bubbles",
        guest: "Real Champagne — crisp citrus with that classy toasty note.",
        selling: "The upgrade people feel instantly: finer bubbles + more complexity = more luxury.",
        service: "Serve very cold (4–6°C). Flute or white wine glass."
      }
    ];

    // Dedupe (by exact name)
    const uniq = [];
    const seen = new Set();
    for (const w of WINES) {
      if (!seen.has(w.name)) { uniq.push(w); seen.add(w.name); }
    }

    function App() {
      const [search, setSearch] = React.useState("");
      const [openName, setOpenName] = React.useState(null);

      const filtered = uniq.filter(w => {
        const s = search.toLowerCase().trim();
        if (!s) return true;
        return (
          (w.name || "").toLowerCase().includes(s) ||
          (w.region || "").toLowerCase().includes(s) ||
          (w.grapes || "").toLowerCase().includes(s) ||
          (w.category || "").toLowerCase().includes(s)
        );
      });

      return React.createElement(
        "div",
        { className: "max-w-3xl mx-auto p-4 pb-24" },

        // Header
        React.createElement(
          "div",
          { className: "sticky top-0 bg-black pt-6 pb-4 z-10" },
          React.createElement("h1", { className: "text-2xl font-extrabold tracking-widest uppercase" }, "Wine Bible"),
          React.createElement("div", { className: "mt-4" },
            React.createElement("input", {
              type: "text",
              placeholder: `Search all ${uniq.length} wines...`,
              className: "w-full p-4 text-lg outline-none",
              value: search,
              onChange: (e) => { setSearch(e.target.value); setOpenName(null); }
            })
          )
        ),

        // List
        React.createElement(
          "div",
          { className: "mt-4 space-y-3" },
          filtered.map(w => {
            const isOpen = openName === w.name;

            return React.createElement(
              "div",
              { key: w.name, className: "card p-4" },

              React.createElement(
                "button",
                {
                  className: "w-full flex items-center justify-between text-left",
                  onClick: () => setOpenName(isOpen ? null : w.name)
                },
                React.createElement(
                  "div",
                  null,
                  React.createElement("div", null,
                    React.createElement("span", { className: "tag" }, w.category),
                    React.createElement("span", { className: "text-lg font-semibold" }, w.name)
                  ),
                  React.createElement("div", { className: "text-sm text-zinc-400 mt-1" }, `${w.region} • ${w.grapes}`)
                ),
                React.createElement("div", { className: "text-2xl text-zinc-500 leading-none" }, isOpen ? "–" : "+")
              ),

              isOpen && React.createElement(
                "div",
                { className: "mt-4 pt-4 border-t border-zinc-800 space-y-3 text-sm text-zinc-200" },

                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Taste"),
                  React.createElement("div", null, w.taste || "—")
                ),

                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Guest-friendly description"),
                  React.createElement("div", null, w.guest || "—")
                ),

                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Selling line"),
                  React.createElement("div", null, w.selling || "—")
                ),

                React.createElement("div", null,
                  React.createElement("div", { className: "text-zinc-400 font-semibold mb-1" }, "Service note"),
                  React.createElement("div", null, w.service || "—")
                )
              )
            );
          })
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
